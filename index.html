<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean AI Generator V7</title>

<style>
body{font-family:Arial;background:#020617;color:#e5e7eb;margin:0;padding:30px}
.container{max-width:1200px;margin:auto}
.card{background:#0f172a;border-radius:14px;padding:24px;margin-bottom:20px;box-shadow:0 10px 25px rgba(0,0,0,0.4)}
select,button{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;font-size:14px}
select{background:#1e293b;color:white}
button{cursor:pointer}
.generate{background:#2563eb;color:white}
.random{background:#f59e0b;color:white}
.copy{background:#10b981;color:white;margin-top:10px}
textarea{width:100%;height:260px;margin-top:10px;background:#020617;color:#22c55e;border-radius:10px;padding:10px;border:none;font-family:monospace}
label{font-weight:bold;margin-top:12px;display:block}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
</style>
</head>

<body>

<div class="container">

<h1>🌊 Ocean AI Generator V7</h1>
<p>Professional JSON Output (3 Prompt System)</p>

<div class="card">

<select id="outfit">
<option value="a tropical diving rash guard and diving shorts">Tropical Outfit</option>
<option value="a professional black scuba diving suit with oxygen tank and fins">Scuba Suit</option>
<option value="a deep sea exploration suit">Deep Sea Suit</option>
</select>

<select id="action">
<option value="filming marine wildlife with a camera">Filming</option>
<option value="slowly swimming through the ocean">Swimming</option>
<option value="floating calmly in open ocean">Floating</option>
</select>

<select id="location">
<option value="a vibrant tropical coral reef">Coral Reef</option>
<option value="the deep blue open ocean">Open Ocean</option>
<option value="a mysterious deep sea trench">Deep Sea</option>
</select>

<select id="water">
<option value="deep dark ocean water">Dark Water</option>
<option value="crystal clear tropical water">Clear Water</option>
</select>

<select id="animal"></select>

<select id="behavior">
<option value="slowly emerging from the darkness">Emerging</option>
<option value="circling curiously">Circling</option>
</select>

<select id="camera">
<option value="a GoPro POV underwater camera">GoPro</option>
<option value="a cinematic IMAX underwater camera">IMAX</option>
</select>

<select id="lighting">
<option value="dramatic sunlight rays piercing the water">Sun Rays</option>
<option value="deep mysterious ocean lighting">Deep Light</option>
</select>

<select id="duration">
<option value="6">6 sec</option>
<option value="12" selected>12 sec</option>
<option value="15">15 sec</option>
</select>

<select id="style">
<option value="BBC Planet Earth wildlife documentary">BBC</option>
<option value="National Geographic underwater documentary">NatGeo</option>
</select>

<button class="generate" onclick="generate()">Generate</button>
<button class="random" onclick="randomize()">🎲 Random</button>

</div>

<div class="grid">

<div class="card">
<label>Animal Only</label>
<textarea id="out1"></textarea>
<button class="copy" onclick="copyText('out1')">Copy</button>
</div>

<div class="card">
<label>Human Only</label>
<textarea id="out2"></textarea>
<button class="copy" onclick="copyText('out2')">Copy</button>
</div>

<div class="card">
<label>Hybrid</label>
<textarea id="out3"></textarea>
<button class="copy" onclick="copyText('out3')">Copy</button>
</div>

</div>

</div>

<script>

let animalDB={}

// LOAD DATABASE
fetch("animalDB.json")
.then(res=>res.json())
.then(data=>{
  animalDB=data
  const select=document.getElementById("animal")
  Object.keys(data).forEach(name=>{
    let opt=document.createElement("option")
    opt.value=name
    opt.textContent=name
    select.appendChild(opt)
  })
})

// BASE JSON
function baseJSON(promptText, subject, setting, creature, camera, duration, style){
return {
metadata:{
title:"Ocean AI Viral Scene",
generator:"Ocean AI Generator V7"
},
video_analysis:{
subject:subject,
setting:setting,
creature:creature,
camera:camera
},
ai_generation_prompt:{
text_to_video_prompt:promptText,
negative_prompt:"blurry, low quality, cartoon, unrealistic animals",
technical_specs:{
aspect_ratio:"9:16",
resolution:"4K",
frame_rate:"30fps",
duration_seconds:Number(duration)
},
style:style
}
}
}

// GENERATE (FIXED)
function generate(){

const outfitVal=document.getElementById("outfit").value
const actionVal=document.getElementById("action").value
const locationVal=document.getElementById("location").value
const waterVal=document.getElementById("water").value
const animalVal=document.getElementById("animal").value
const behaviorVal=document.getElementById("behavior").value
const cameraVal=document.getElementById("camera").value
const lightingVal=document.getElementById("lighting").value
const durationVal=document.getElementById("duration").value
const styleVal=document.getElementById("style").value

const animalDesc=animalDB[animalVal] || "a giant ocean creature"

// CHARACTER
const human=`A young female ocean explorer wearing ${outfitVal}`

// 1. ANIMAL
const p1=baseJSON(
`Ultra realistic underwater video of ${animalDesc} in ${locationVal}. The water is ${waterVal}. The creature is ${behaviorVal}. Shot using ${cameraVal}. Lighting: ${lightingVal}. Style: ${styleVal}.`,
"Marine creature focus",
`${locationVal} with ${waterVal}`,
animalVal,
cameraVal,
durationVal,
styleVal
)

// 2. HUMAN
const p2=baseJSON(
`Ultra realistic underwater video of ${human}. She is ${actionVal} in ${locationVal}. The water is ${waterVal}. No animals present. Shot using ${cameraVal}. Lighting: ${lightingVal}. Style: ${styleVal}.`,
human,
`${locationVal} with ${waterVal}`,
"No creature",
cameraVal,
durationVal,
styleVal
)

// 3. HYBRID
const p3=baseJSON(
`Ultra realistic cinematic underwater video of ${human}. She is ${actionVal} in ${locationVal}. The water is ${waterVal}. Suddenly a gigantic ${animalVal} appears. The creature is described as ${animalDesc}. The creature is ${behaviorVal}. This creates a dramatic viral wildlife moment. Shot using ${cameraVal}. Lighting: ${lightingVal}. Style: ${styleVal}.`,
human,
`${locationVal} with ${waterVal}`,
animalVal,
cameraVal,
durationVal,
styleVal
)

// OUTPUT
document.getElementById("out1").value=JSON.stringify(p1,null,2)
document.getElementById("out2").value=JSON.stringify(p2,null,2)
document.getElementById("out3").value=JSON.stringify(p3,null,2)

}

// RANDOM (FIXED)
function randomize(){
const selects=document.querySelectorAll("select")
selects.forEach(s=>{
s.selectedIndex=Math.floor(Math.random()*s.options.length)
})
generate()
}

// COPY
function copyText(id){
const el=document.getElementById(id)
el.select()
document.execCommand("copy")
alert("Copied!")
}

</script>

</body>
</html>
