<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ocean Diving Scene Builder</title>

<style>
body{font-family:Arial,Helvetica,sans-serif;background:#020617;color:#e5e7eb;margin:0;padding:30px}
.container{max-width:1200px;margin:auto}
.card{background:#0f172a;border-radius:14px;padding:24px;margin-bottom:20px;box-shadow:0 10px 25px rgba(0,0,0,0.4)}
select,button{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;font-size:14px}
select{background:#1e293b;color:#fff}
button{cursor:pointer}
.generate{background:#2563eb;color:white}
.copy{background:#10b981;color:white;margin-top:10px}
.random{background:#f59e0b;color:white;margin-top:10px}
.viral{background:#ef4444;color:white;margin-top:10px}
textarea{width:100%;height:300px;margin-top:10px;background:#020617;color:#22c55e;border-radius:10px;padding:10px;border:none;font-family:monospace}
h1{margin-bottom:10px}
label{font-weight:bold;margin-top:12px;display:block}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
</style>

</head>
<body>

<div class="container">
<h1>AI Ocean Diving Scene Builder</h1>

<div class="card">

<label>Diver Top Clothing</label>
<select id="clothing">
<option value="a black diving tank top">Diving Tank Top</option>
<option value="a lightweight scuba diving suit">Light Scuba Suit</option>
<option value="a tropical diving rash guard">Rash Guard</option>
<option value="a sleeveless diving vest">Diving Vest</option>
</select>

<label>Diver Bottom Wear</label>
<select id="pants">
<option value="black diving shorts">Diving Shorts</option>
<option value="neoprene diving leggings">Diving Leggings</option>
<option value="lightweight swim shorts">Swim Shorts</option>
<option value="professional scuba diving pants">Scuba Pants</option>
</select>

<label>Diving Accessories</label>
<select id="accessories">
<option value="a scuba oxygen tank and diving mask">Scuba Tank + Mask</option>
<option value="diving mask and snorkel">Mask + Snorkel</option>
<option value="full scuba diving gear with oxygen tank and fins">Full Scuba Gear</option>
<option value="diving mask and underwater camera">Underwater Camera</option>
<option value="none">None</option>
</select>

<label>Facial Expression</label>
<select id="expression">
<option value="none" selected>None</option>
<option value="smiling with excitement">Smiling</option>
<option value="looking surprised and amazed">Surprised</option>
<option value="looking shocked by the marine life">Shocked</option>
<option value="excited and curious">Excited</option>
</select>

<label>Ocean Location</label>
<select id="location">
<option value="a colorful tropical coral reef">Coral Reef</option>
<option value="a deep blue open ocean" selected>Open Ocean</option>
<option value="a coral reef canyon filled with fish">Coral Canyon</option>
<option value="a crystal clear lagoon with marine life">Blue Lagoon</option>
<option value="a mysterious deep sea environment">Deep Sea</option>
</select>

<label>Marine Animal Database</label>
<select id="animal"></select>

<label>Animal Behavior</label>
<select id="behavior">
<option value="swimming gracefully nearby">Swimming Nearby</option>
<option value="slowly passing behind the diver" selected>Passing Behind</option>
<option value="circling curiously">Circling</option>
<option value="swimming together in a group">Swimming School</option>
<option value="approaching curiously">Approaching</option>
</select>

<label>Camera Movement</label>
<select id="camera">
<option value="a smart adaptive cinematic underwater camera movement" selected>Smart Camera Movement</option>
<option value="a handheld underwater selfie camera">Selfie</option>
<option value="a smooth underwater tracking shot">Tracking</option>
<option value="a cinematic drone like underwater camera">Cinematic</option>
</select>

<label>Shot Composition</label>
<select id="shot">
<option value="a smart cinematic balanced underwater composition" selected>Smart Shot</option>
<option value="close-up underwater wildlife shot">Close-up</option>
<option value="wide cinematic underwater wildlife shot">Wide</option>
</select>

<label>Lighting</label>
<select id="lighting">
<option value="sunlight rays piercing through the ocean water">Sun Rays</option>
<option value="soft blue underwater lighting">Soft Blue</option>
<option value="dramatic deep sea lighting">Deep Sea</option>
</select>

<label>Environment Effects</label>
<select id="effects">
<option value="none" selected>None</option>
<option value="floating bubbles rising through the water">Bubbles</option>
<option value="floating plankton particles in the water">Plankton</option>
</select>

<label>Duration</label>
<select id="duration">
<option value="5">5 sec</option>
<option value="8">8 sec</option>
<option value="12">12 sec</option>
</select>

<label>Style</label>
<select id="style">
<option value="cinematic underwater nature film">Cinematic</option>
<option value="marine wildlife documentary realism">Documentary</option>
<option value="epic cinematic ocean adventure">Epic</option>
</select>

<button class="generate" onclick="generateJSON()">Generate JSON</button>

</div>

<div class="grid">

<div class="card">
<label>JSON 1 (Original)</label>
<textarea id="output1"></textarea>
<button class="copy" onclick="copyJSON('output1')">Copy JSON 1</button>
</div>

<div class="card">
<label>JSON 2 (Animal Only)</label>
<textarea id="output2"></textarea>
<button class="copy" onclick="copyJSON('output2')">Copy JSON 2</button>
</div>

</div>

</div>

<script src="animalDB.js"></script>

<script>

const animalSelect=document.getElementById("animal")
Object.keys(animalDB).forEach(name=>{
const opt=document.createElement("option")
opt.value=name
opt.textContent=name
animalSelect.appendChild(opt)
})

function generateJSON(){

const clothing=clothingEl.value
const pants=pantsEl.value
const accessories=accessoriesEl.value
const expression=expressionEl.value
const location=locationEl.value
const animal=animalEl.value
const animalDesc=animalDB[animal]
const behavior=behaviorEl.value
const camera=cameraEl.value
const shot=shotEl.value
const lighting=lightingEl.value
const effects=effectsEl.value
const duration=durationEl.value
const style=styleEl.value

// JSON 1 (UNCHANGED)
const json1={
metadata:{title:"AI Ocean Diving Scene",generator:"AI Ocean Diving Scene Builder"},
video_analysis:{
subject:`A young woman ${expression !== "none" ? expression + "," : ""} wearing ${clothing}, ${pants}, and ${accessories}`,
setting:location,
background_elements:`${animal} described as ${animalDesc} ${behavior}`,
camera_movement:camera
},
ai_generation_prompt:{
text_to_video_prompt:`Cinematic ${shot} underwater video of a young woman ${expression !== "none" ? expression + "," : ""} wearing ${clothing}, ${pants}, and ${accessories}, diving in ${location}. The camera performs ${camera}. Nearby there is ${animal} described as ${animalDesc} ${behavior}. Lighting: ${lighting}. Effects: ${effects}. Style ${style}.`,
negative_prompt:"blurry, distorted fish, unrealistic anatomy",
technical_specs:{aspect_ratio:"9:16",resolution:"4K",frame_rate:"30fps",duration_seconds:Number(duration),style:style}
}
}

// JSON 2 (ANIMAL ONLY)
const json2={
metadata:{title:"AI Ocean Wildlife Scene",generator:"AI Ocean Generator"},
video_analysis:{
subject:`${animal} described as ${animalDesc}`,
setting:location,
behavior:behavior,
camera_movement:camera
},
ai_generation_prompt:{
text_to_video_prompt:`Cinematic ${shot} underwater wildlife footage of ${animal} described as ${animalDesc} ${behavior} in ${location}. Camera uses ${camera}. Lighting: ${lighting}. Effects: ${effects}. Highly realistic marine life, documentary style. ${style}.`,
negative_prompt:"humans, diver, people, blurry, cartoon",
technical_specs:{aspect_ratio:"9:16",resolution:"4K",frame_rate:"30fps",duration_seconds:Number(duration),style:style}
}
}

output1.value=JSON.stringify(json1,null,2)
output2.value=JSON.stringify(json2,null,2)
}

// shortcut refs
const clothingEl=document.getElementById('clothing')
const pantsEl=document.getElementById('pants')
const accessoriesEl=document.getElementById('accessories')
const expressionEl=document.getElementById('expression')
const locationEl=document.getElementById('location')
const animalEl=document.getElementById('animal')
const behaviorEl=document.getElementById('behavior')
const cameraEl=document.getElementById('camera')
const shotEl=document.getElementById('shot')
const lightingEl=document.getElementById('lighting')
const effectsEl=document.getElementById('effects')
const durationEl=document.getElementById('duration')
const styleEl=document.getElementById('style')

function copyJSON(id){
const text=document.getElementById(id)
text.select()
document.execCommand('copy')
alert('Copied!')
}

</script>

</body>
</html>
