<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ocean AI Generator V6</title>

<style>
body{font-family:Arial;background:#020617;color:#e5e7eb;margin:0;padding:30px}
.container{max-width:1200px;margin:auto}
.card{background:#0f172a;border-radius:14px;padding:24px;margin-bottom:20px;box-shadow:0 10px 25px rgba(0,0,0,0.4)}
select,button{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;font-size:14px}
select{background:#1e293b;color:white}
button{cursor:pointer}
.generate{background:#2563eb;color:white}
.random{background:#f59e0b;color:white}
.copy{background:#10b981;color:white;margin-top:10px}
textarea{width:100%;height:150px;margin-top:10px;background:#020617;color:#22c55e;border-radius:10px;padding:10px;border:none;font-family:monospace}
label{font-weight:bold;margin-top:12px;display:block}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
</style>
</head>

<body>

<div class="container">

<h1>🌊 Ocean AI Generator V6</h1>
<p>3 Prompt Mode (Copy Ready)</p>

<div class="card">

<label>Diver Outfit</label>
<select id="outfit">
<option value="a professional black scuba diving suit with oxygen tank and fins">Professional Scuba Suit</option>
<option value="a tropical diving rash guard and diving shorts">Tropical Outfit</option>
<option value="a deep sea exploration suit">Deep Sea Suit</option>
<option value="a minimalist freediving suit">Freediving Suit</option>
</select>

<label>Diver Action</label>
<select id="action">
<option value="slowly swimming through the ocean">Swimming</option>
<option value="exploring an underwater canyon">Exploring</option>
<option value="filming marine wildlife">Filming</option>
<option value="floating calmly">Floating</option>
</select>

<label>Location</label>
<select id="location">
<option value="a vibrant coral reef">Coral Reef</option>
<option value="the deep open ocean">Open Ocean</option>
<option value="a deep sea trench">Deep Sea</option>
</select>

<label>Water</label>
<select id="water">
<option value="crystal clear water">Clear</option>
<option value="dark deep water">Dark</option>
<option value="murky water">Murky</option>
</select>

<label>Creature</label>
<select id="animal"></select>

<label>Behavior</label>
<select id="behavior">
<option value="slowly emerging">Emerging</option>
<option value="circling">Circling</option>
<option value="gliding">Gliding</option>
<option value="approaching">Approaching</option>
</select>

<label>Camera</label>
<select id="camera">
<option value="GoPro POV">GoPro</option>
<option value="cinematic wide lens">Wide</option>
<option value="IMAX camera">IMAX</option>
</select>

<label>Lighting</label>
<select id="lighting">
<option value="sun rays">Sun Rays</option>
<option value="deep ocean light">Deep Light</option>
<option value="tropical light">Tropical</option>
</select>

<button class="generate" onclick="generate()">Generate</button>
<button class="random" onclick="randomize()">🎲 Random</button>

</div>

<div class="grid">

<div class="card">
<label>Animal Only</label>
<textarea id="out1"></textarea>
<button class="copy" onclick="copyText('out1')">Copy</button>
</div>

<div class="card">
<label>Human Only</label>
<textarea id="out2"></textarea>
<button class="copy" onclick="copyText('out2')">Copy</button>
</div>

<div class="card">
<label>Hybrid</label>
<textarea id="out3"></textarea>
<button class="copy" onclick="copyText('out3')">Copy</button>
</div>

</div>

</div>

<script>

let animalDB={}

// LOAD DATABASE
fetch("animalDB.json")
.then(res=>res.json())
.then(data=>{
  animalDB=data
  const animalSelect=document.getElementById("animal")
  Object.keys(data).forEach(name=>{
    let opt=document.createElement("option")
    opt.value=name
    opt.textContent=name
    animalSelect.appendChild(opt)
  })
})

// GENERATE
function generate(){

const outfit=document.getElementById("outfit").value
const action=document.getElementById("action").value
const location=document.getElementById("location").value
const water=document.getElementById("water").value
const animal=document.getElementById("animal").value
const behavior=document.getElementById("behavior").value
const camera=document.getElementById("camera").value
const lighting=document.getElementById("lighting").value

const animalDesc=animalDB[animal] || "a giant ocean creature"

// CONSISTENT CHARACTER
const human=`A young female ocean explorer with long flowing hair wearing ${outfit}`

// PROMPTS
const p1=`Ultra realistic underwater video of ${animalDesc} in ${location}, ${water}, ${behavior}, shot with ${camera}, lighting ${lighting}`

const p2=`Ultra realistic underwater video of ${human}, she is ${action} in ${location}, ${water}, no animals, cinematic calm scene`

const p3=`Ultra realistic underwater video of ${human}, she is ${action} in ${location}, ${water}, suddenly ${animalDesc} appears, ${behavior}, cinematic viral moment`

document.getElementById("out1").value=p1
document.getElementById("out2").value=p2
document.getElementById("out3").value=p3

}

// RANDOM
function randomize(){
document.querySelectorAll("select").forEach(s=>{
s.selectedIndex=Math.floor(Math.random()*s.options.length)
})
generate()
}

// COPY
function copyText(id){
const el=document.getElementById(id)
el.select()
document.execCommand("copy")
alert("Copied!")
}

</script>

</body>
</html>
