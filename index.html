<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ocean Diving Scene Builder</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#020617;color:#e5e7eb;margin:0;padding:30px}
.container{max-width:1200px;margin:auto}
.card{background:#0f172a;border-radius:14px;padding:24px;margin-bottom:20px;box-shadow:0 10px 25px rgba(0,0,0,0.4)}
select,button{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:none;font-size:14px}
select{background:#1e293b;color:#fff}
button{cursor:pointer}
.generate{background:#2563eb;color:white}
.copy{background:#10b981;color:white;margin-top:10px}
.random{background:#f59e0b;color:white;margin-top:10px}
textarea{width:100%;height:260px;margin-top:10px;background:#020617;color:#22c55e;border-radius:10px;padding:10px;border:none;font-family:monospace}
h1{margin-bottom:10px}
label{font-weight:bold;margin-top:12px;display:block}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
</style>
</head>
<body>
<div class="container">
<h1>AI Ocean Diving Scene Builder</h1>

<div class="card">

<label>Diver Outfit</label>
<select id="outfit">
<option value="a professional full-body scuba diving suit">Full Scuba Suit</option>
<option value="a tropical diving rash guard with shorts">Rash Guard + Shorts</option>
<option value="a lightweight modern scuba outfit">Modern Scuba Outfit</option>
<option value="a stylish bikini scuba diver outfit with diving gear">Bikini Scuba Diver</option>
</select>

<label>Diving Accessories</label>
<select id="accessories">
<option value="full scuba diving gear including oxygen tank, mask, regulator, and fins">Full Gear + Fins</option>
<option value="mask, snorkel, and fins">Mask + Snorkel + Fins</option>
<option value="underwater camera, mask, and fins">Camera + Fins</option>
<option value="none">None</option>
</select>

<label>Facial Expression</label>
<select id="expression">
<option value="looking surprised and amazed" selected>Surprised</option>
<option value="smiling with excitement">Smiling</option>
</select>

<label>Ocean Location</label>
<select id="location">
<option value="a deep blue open ocean" selected>Open Ocean</option>
<option value="a colorful coral reef">Coral Reef</option>
</select>

<label>Marine Animal</label>
<select id="animal"></select>

<label>Animal Behavior</label>
<select id="behavior">
<option value="slowly passing behind" selected>Passing Behind</option>
<option value="swimming nearby">Nearby</option>
</select>

<label>Camera Movement</label>
<select id="camera">
<option value="smart cinematic underwater camera movement" selected>Smart Camera</option>
<option value="tracking underwater shot">Tracking</option>
</select>

<label>Shot Composition</label>
<select id="shot">
<option value="wide cinematic underwater shot" selected>Wide Shot</option>
<option value="close-up underwater shot">Close-up</option>
</select>

<label>Lighting</label>
<select id="lighting">
<option value="sun rays penetrating water">Sun Rays</option>
<option value="soft blue underwater lighting">Soft Blue</option>
</select>

<label>Environment Effects</label>
<select id="effects">
<option value="none" selected>None</option>
<option value="bubbles">Bubbles</option>
</select>

<button class="generate" onclick="generateJSON()">Generate Dual JSON</button>
<button class="random" onclick="randomPrompt()">🎲 Random</button>

</div>

<div class="grid">
<div class="card">
<label>Main Prompt (With Diver)</label>
<textarea id="output1"></textarea>
<button class="copy" onclick="copyText('output1')">Copy</button>
</div>

<div class="card">
<label>Animal Focus Prompt (No Human)</label>
<textarea id="output2"></textarea>
<button class="copy" onclick="copyText('output2')">Copy</button>
</div>
</div>

</div>

<script>

const animalDB={
"Whale":"a massive blue whale",
"Dolphin":"a playful dolphin",
"Shark":"a powerful shark",
"Octopus":"a large octopus",
"Turtle":"a graceful sea turtle"
}

const animalSelect=document.getElementById("animal")
Object.keys(animalDB).forEach(name=>{
const opt=document.createElement("option")
opt.value=name
opt.textContent=name
animalSelect.appendChild(opt)
})

function generateJSON(){

const outfit=document.getElementById('outfit').value
const accessories=document.getElementById('accessories').value
const expression=document.getElementById('expression').value
const location=document.getElementById('location').value
const animal=document.getElementById('animal').value
const animalDesc=animalDB[animal]
const behavior=document.getElementById('behavior').value
const camera=document.getElementById('camera').value
const shot=document.getElementById('shot').value
const lighting=document.getElementById('lighting').value
const effects=document.getElementById('effects').value

// ===== MAIN (WITH HUMAN) =====
const json1={
metadata:{
 title:"Ocean Scene With Diver",
 generator:"AI Builder"
},
video_analysis:{
subject:`A woman ${expression}, wearing ${outfit} with ${accessories}`,
setting:location,
background_elements:`${animal} ${behavior}`,
camera_movement:camera
},
ai_generation_prompt:{
text_to_video_prompt:`${shot} of a woman ${expression}, wearing ${outfit} with ${accessories}, diving in ${location}. A ${animalDesc} is ${behavior}. Lighting: ${lighting}. Effects: ${effects}.`,
negative_prompt:"low quality, blurry",
technical_specs:{resolution:"4K"}
}
}

// ===== ANIMAL ONLY =====
const json2={
metadata:{
 title:"Animal Focus Scene",
 generator:"AI Builder"
},
video_analysis:{
subject:`A ${animalDesc}`,
setting:location,
background_elements:`the animal is ${behavior}`,
camera_movement:camera
},
ai_generation_prompt:{
text_to_video_prompt:`${shot} underwater video of ${animalDesc} in ${location}. The animal is ${behavior}. Cinematic, realistic marine life. Lighting: ${lighting}. Effects: ${effects}. No humans.`,
negative_prompt:"humans, diver, blurry, low quality",
technical_specs:{resolution:"4K"}
}
}

document.getElementById('output1').value=JSON.stringify(json1,null,2)
document.getElementById('output2').value=JSON.stringify(json2,null,2)
}

function randomPrompt(){
document.querySelectorAll('select').forEach(select=>{
select.selectedIndex=Math.floor(Math.random()*select.options.length)
})
generateJSON()
}

function copyText(id){
const text=document.getElementById(id)
text.select()
document.execCommand('copy')
alert('Copied!')
}

</script>

</body>
</html>
